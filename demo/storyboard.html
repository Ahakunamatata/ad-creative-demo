<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storyboard 工作区 · App UA Storyboard Workbench</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="shell" id="storyboardPage">
    <header class="topbar">
      <div class="brand">
        <strong>Storyboard Studio</strong>
        <span>逐镜头编辑脚本、字幕、声音和顺序，边看边改，不必整条重做。</span>
      </div>
      <div class="button-row">
        <a class="btn btn-ghost" href="./angles.html" id="backToAngles">返回路线页</a>
        <a class="btn btn-ghost" href="./index.html">返回首页</a>
      </div>
    </header>

    <section class="hero">
      <div class="hero-row">
        <div class="grid">
          <div class="eyebrow">Studio</div>
          <h1>从脚本到镜头都在一个工作区里完成。</h1>
          <p>左边挑镜头，中间预览整体节奏，底部调整顺序，右边编辑字幕、配音和语言版本。</p>
        </div>
        <div class="button-row">
          <button class="btn btn-secondary" type="button" id="addScene">新增分镜</button>
          <button class="btn btn-primary" type="button" id="fakeExport">更新生成任务</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="eyebrow">Workspace Brief</div>
      <div id="workspaceBrief"></div>
    </section>

    <section class="workspace">
      <aside class="panel">
        <div class="eyebrow">Scenes</div>
        <h2>镜头列表</h2>
        <p class="muted">点击任一镜头，同步更新中间预览、底部时间线和右侧编辑区。</p>
        <div class="scene-list" id="sceneList"></div>
      </aside>

      <main class="panel">
        <div class="eyebrow">Preview</div>
        <div id="playerMount"></div>
        <div class="split">
          <div>
            <h3>时间线</h3>
            <p class="muted">拖动前的关键操作都集中在这里：换顺序、拆镜头、插新镜头。</p>
          </div>
        </div>
        <div class="timeline" id="timeline"></div>
      </main>

      <aside class="panel">
        <div class="eyebrow">Edit</div>
        <h2>镜头设置</h2>
        <p class="muted">修改当前镜头的脚本、字幕、配音和多语言版本。</p>
        <form class="field-grid" id="sceneForm"></form>
        <div class="eyebrow">Production Package</div>
        <div class="button-row">
          <button class="btn btn-secondary" type="button" id="sendToRender">进入生成链路</button>
          <button class="btn btn-ghost" type="button" id="replaceWeakScenes">替换弱表现镜头</button>
        </div>
        <div class="code-block" id="packageMount"></div>
        <div class="eyebrow">Test Feedback</div>
        <div class="field-grid" id="feedbackMount"></div>
      </aside>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
